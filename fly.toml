# fly.toml — https://fly.io/docs/reference/configuration/
app = "lotto-picker"          # change to your app name
primary_region = "nrt"        # Tokyo — closest to Korean users

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV       = "production"
  PORT           = "3000"
  HOSTNAME       = "0.0.0.0"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = true   # scale to zero when idle (saves cost)
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size   = "shared-cpu-1x"   # 256 MB RAM — sufficient for this app
  memory = "256mb"
